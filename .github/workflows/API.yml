name: Deploy Producto API to Azure

env:
  AZURE_WEBAPP_NAME: app-producto-api-practica8
  DOTNET_VERSION: '8.0'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Producto.API/API/**'
      - 'Producto.API/Abstracciones/**'
      - 'Producto.API/DA/**'
      - 'Producto.API/Flujo/**'
      - 'Producto.API/Reglas/**'
      - 'Producto.API/Servicios/**'
      - '.github/workflows/API.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configurar GitHub Packages
        run: |
          dotnet nuget remove source github-sc701 || true
          dotnet nuget add source "https://nuget.pkg.github.com/SC-701/index.json" \
            --name "github-sc701" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.NUGET_TOKEN }}" \
            --store-password-in-clear-text

      - name: Restaurar dependencias del API
        run: dotnet restore Producto.API/API/API.csproj

      - name: Compilar API
        run: dotnet build Producto.API/API/API.csproj --configuration Release --no-restore

      - name: Publicar API
        run: dotnet publish Producto.API/API/API.csproj --configuration Release --no-build --output ./publish

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: producto-api
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: none
    environment:
      name: PRODUCTO-API
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: producto-api

      - name: Deploy a Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.PRODUCTOAPIJORDY_PROFILE }}
          package: .