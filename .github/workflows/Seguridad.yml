name: Deploy Seguridad API to Azure

env:
  AZURE_WEBAPP_NAME: app-seguridad-practica8
  DOTNET_VERSION: '8.0'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Seguridad.API/**'
      - '.github/workflows/Seguridad.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configurar GitHub Packages
        run: |
          dotnet nuget remove source github-sc701 || true
          dotnet nuget add source "https://nuget.pkg.github.com/SC-701/index.json" \
            --name "github-sc701" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.NUGET_TOKEN }}" \
            --store-password-in-clear-text

      - name: Restaurar dependencias
        run: |
          cd Seguridad.API
          dotnet restore Abstracciones/Abstracciones.csproj
          dotnet restore DA/DA.csproj
          dotnet restore Flujo/Flujo.csproj
          dotnet restore Reglas/Reglas.csproj
          dotnet restore API/API.csproj

      - name: Compilar proyectos
        run: |
          cd Seguridad.API
          dotnet build Abstracciones/Abstracciones.csproj --configuration Release --no-restore
          dotnet build DA/DA.csproj --configuration Release --no-restore
          dotnet build Flujo/Flujo.csproj --configuration Release --no-restore
          dotnet build Reglas/Reglas.csproj --configuration Release --no-restore
          dotnet build API/API.csproj --configuration Release --no-restore

      - name: Publicar Seguridad API
        run: dotnet publish Seguridad.API/API/API.csproj --configuration Release --no-build --output ./publish

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: seguridad-api
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: none
    environment:
      name: SEGURIDAD
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: seguridad-api


      - name: Deploy a Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.SEGURIDADJORDY_PROFILE }}
          package: .